<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASSA — 捐赠与支持咨询</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 400; line-height: 1.8;
      color: #2d3748; background: #f7fafc;
      -webkit-font-smoothing: antialiased;
    }
    a { color: #3182ce; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .site-header { background: #fff; border-bottom: 1px solid #e2e8f0; }
    .site-header .container {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 960px; margin: 0 auto; padding: 16px 24px;
    }
    .site-logo { font-weight: 700; font-size: 1.2rem; letter-spacing: 0.05em; }
    .back-link { font-size: 0.85rem; color: #4a5568; }
    .lang-switch { display: flex; gap: 8px; font-size: 0.75rem; }
    .lang-switch a { color: #a0aec0; padding: 2px 6px; }
    .lang-switch a.active { color: #3182ce; font-weight: 700; }
    .hero {
      background: linear-gradient(135deg, #2b6cb0, #38a169);
      color: #fff; padding: 64px 24px 48px; text-align: center;
    }
    .hero h1 { font-size: 1.75rem; font-weight: 700; line-height: 1.4; margin-bottom: 12px; }
    .hero p { font-size: 0.95rem; opacity: 0.95; max-width: 600px; margin: 0 auto; }
    .container-form { max-width: 720px; margin: -32px auto 64px; padding: 0 24px; }
    .intro {
      background: #fff; border-radius: 12px; padding: 32px;
      margin-bottom: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.04);
      border-left: 4px solid #3182ce;
    }
    .intro h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; color: #2b6cb0; }
    .intro p { font-size: 0.92rem; color: #4a5568; margin-bottom: 8px; }
    .form-card {
      background: #fff; border-radius: 12px; padding: 40px 32px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    }
    .form-group { margin-bottom: 24px; }
    .form-group label {
      display: block; font-size: 0.9rem; font-weight: 500;
      margin-bottom: 6px; color: #2d3748;
    }
    .form-group label .req { color: #e53e3e; font-size: 0.7rem; margin-left: 4px; font-weight: 700; }
    .form-group label .opt { color: #a0aec0; font-size: 0.7rem; margin-left: 4px; }
    .form-group input[type="text"], .form-group input[type="email"],
    .form-group input[type="tel"], .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1px solid #cbd5e0;
      border-radius: 6px; font-family: inherit; font-size: 0.95rem;
      color: #2d3748; background: #fff; transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: #3182ce;
      box-shadow: 0 0 0 3px rgba(49,130,206,0.12);
    }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .radio-group { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 4px; }
    .radio-group label {
      display: inline-flex; align-items: center; font-size: 0.9rem;
      font-weight: 400; cursor: pointer; margin: 0;
    }
    .radio-group input { margin-right: 6px; }
    .checkbox-group {
      display: flex; align-items: flex-start; font-size: 0.9rem;
      padding: 12px; background: #f7fafc; border-radius: 6px;
    }
    .checkbox-group input { margin-right: 10px; margin-top: 4px; }
    .submit-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #3182ce, #48bb78);
      color: #fff; font-size: 1rem; font-weight: 700;
      border: none; border-radius: 8px; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s; letter-spacing: 0.02em;
    }
    .submit-btn:hover {
      transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,206,0.25);
    }
    .alt-contact {
      text-align: center; margin-top: 24px; padding-top: 24px;
      border-top: 1px solid #e2e8f0; font-size: 0.85rem; color: #718096;
    }
    .alt-contact a { font-weight: 500; }
    .site-footer {
      text-align: center; padding: 24px; font-size: 0.8rem;
      color: #a0aec0; background: #fff; border-top: 1px solid #e2e8f0;
    }
    @media (max-width: 640px) {
      .hero h1 { font-size: 1.4rem; }
      .form-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container">
      <span class="site-logo">ASSA</span>
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="lang-switch">
          <a href="donate.html">日本語</a>
          <a href="donate-en.html">EN</a>
          <a href="donate-es.html">ES</a>
          <a href="donate-zh.html" class="active">中文</a>
        </div>
        <a href="zh.html" class="back-link">&larr; 返回首页</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <h1>捐赠与支持咨询</h1>
    <p>感谢您支持 ASSA 项目。</p>
  </section>

  <main class="container-form">

    <div class="intro">
      <h2>关于本表单</h2>
      <p>ASSA 是一个面向构音障碍人群构建日语语音语料库（JDSC）的研究项目。您的支持将用于扩充语料库、向录音参与者支付酬金、以及在国际学术会议上发表成果等研究活动。</p>
      <p style="margin-top:16px;">提交本表单后，项目代表（合同会社 SAI／末永 刚）将通过邮件与您联系，就捐赠方式、税务处理、收据开具等事宜逐一沟通。</p>
    </div>

    <form class="form-card" id="donateForm">

      <div class="form-group">
        <label for="name">姓名 <span class="req">必填</span></label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label>捐赠人类型 <span class="req">必填</span></label>
        <div class="radio-group">
          <label><input type="radio" name="donor_type" value="个人" required> 个人</label>
          <label><input type="radio" name="donor_type" value="法人 / 组织"> 法人 / 组织</label>
        </div>
      </div>

      <div class="form-group">
        <label for="affiliation">所属单位 / 公司名称 <span class="opt">选填</span></label>
        <input type="text" id="affiliation" name="affiliation" placeholder="例：XX大学 / XX有限公司">
      </div>

      <div class="form-group">
        <label for="country">国家 / 地区 <span class="opt">选填</span></label>
        <input type="text" id="country" name="country" placeholder="例：中国、台湾、香港">
      </div>

      <div class="form-group">
        <label for="email">电子邮箱 <span class="req">必填</span></label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="phone">电话 <span class="opt">选填</span></label>
        <input type="tel" id="phone" name="phone">
      </div>

      <div class="form-group">
        <label for="amount">预计捐赠金额 <span class="opt">选填</span></label>
        <select id="amount" name="amount">
          <option value="">— 请选择 —</option>
          <option value="500 元以下">500 元以下</option>
          <option value="500–3,000 元">500–3,000 元</option>
          <option value="3,000–10,000 元">3,000–10,000 元</option>
          <option value="10,000–30,000 元">10,000–30,000 元</option>
          <option value="30,000–100,000 元">30,000–100,000 元</option>
          <option value="100,000 元以上">100,000 元以上</option>
          <option value="希望面谈">希望面谈</option>
        </select>
      </div>

      <div class="form-group">
        <label>捐赠形式 <span class="opt">选填</span></label>
        <div class="radio-group">
          <label><input type="radio" name="donation_form" value="一次性"> 一次性</label>
          <label><input type="radio" name="donation_form" value="持续性"> 持续性</label>
          <label><input type="radio" name="donation_form" value="未定"> 未定</label>
        </div>
      </div>

      <div class="form-group">
        <label for="purpose">资金使用方向 <span class="opt">选填</span></label>
        <select id="purpose" name="purpose">
          <option value="">— 请选择 —</option>
          <option value="项目整体支持">项目整体支持</option>
          <option value="录音参与者酬金">录音参与者酬金</option>
          <option value="技术开发">技术开发（录音应用、语音识别等）</option>
          <option value="国际宣传与会议">国际宣传与学术会议</option>
          <option value="希望面谈">希望面谈</option>
        </select>
      </div>

      <div class="form-group">
        <label for="receipt">是否需要收据 <span class="opt">选填</span></label>
        <select id="receipt" name="receipt">
          <option value="">— 请选择 —</option>
          <option value="需要">需要</option>
          <option value="不需要">不需要</option>
          <option value="希望面谈">希望面谈</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">问题 / 留言 <span class="req">必填</span></label>
        <textarea id="message" name="message" required placeholder="请自由填写您的问题、捐赠动机或具体诉求。"></textarea>
      </div>

      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="consent" name="consent" required>
          <label for="consent" style="margin:0;">
            我同意所填个人信息仅用于联系及捐赠手续办理，不会向第三方提供。
            <span class="req">必填</span>
          </label>
        </div>
      </div>

      <button type="submit" class="submit-btn">通过邮件发送</button>

      <div class="alt-contact">
        如表单无法使用，请直接发送邮件咨询：<br>
        <a href="mailto:suenagago31@gmail.com">suenagago31@gmail.com</a>
      </div>
    </form>
  </main>

  <footer class="site-footer">
    &copy; 2026 ASSA Project. 版权所有。
  </footer>

  <script>
    document.getElementById('donateForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const f = e.target;
      const get = (n) => (f.elements[n] && f.elements[n].value) || '';
      const subject = '[ASSA 捐赠咨询] ' + get('name');
      const lines = [
        '── ASSA 项目 — 捐赠与支持咨询 ──',
        '',
        '[姓名] ' + get('name'),
        '[捐赠人类型] ' + get('donor_type'),
        '[所属单位] ' + get('affiliation'),
        '[国家 / 地区] ' + get('country'),
        '[邮箱] ' + get('email'),
        '[电话] ' + get('phone'),
        '[金额] ' + get('amount'),
        '[捐赠形式] ' + get('donation_form'),
        '[资金使用方向] ' + get('purpose'),
        '[收据] ' + get('receipt'),
        '',
        '[留言]',
        get('message'),
        '',
        '─────────────────────',
        '本邮件由 ASSA 项目捐赠表单发送',
        '(https://gosuenaga.github.io/assa/donate-zh.html)'
      ];
      const body = encodeURIComponent(lines.join('\n'));
      const mailto = 'mailto:suenagago31@gmail.com?subject=' + encodeURIComponent(subject) + '&body=' + body;
      window.location.href = mailto;
    });
  </script>
</body>
</html>
